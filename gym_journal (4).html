<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Journal — TrainingOS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  color-scheme: light only;
  --bg:#ffffff;--bg2:#f5f5f5;--card:#ffffff;--card2:#fafafa;
  --ink:#1a1a1a;--muted:#999;--muted2:#bbb;
  --border:#e8e8e8;--border2:#f0f0f0;
  --teal:#0a7a5e;--orange:#c94a0a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;padding:0 0 120px;padding-top:max(0px,env(safe-area-inset-top));min-height:100vh;-webkit-font-smoothing:antialiased}
.grain{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E")}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.back-link{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .15s}
.back-link:hover,.back-link:active{color:var(--ink)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.28em;color:rgba(0,0,0,.2)}
.topbar-btn{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;color:var(--muted);cursor:pointer;transition:color .15s;padding:0}
.topbar-btn:hover{color:var(--ink)}
.tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tab{padding:11px 22px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
.tab:hover{color:var(--ink)}.tab.active{color:var(--ink);border-bottom-color:var(--ink)}
.tab-content{display:none}.tab-content.active{display:block}
.main{max-width:640px;margin:0 auto;padding:0 20px;position:relative;z-index:1}

/* LOG HEADER */
.log-header{padding:26px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.log-h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,12vw,62px);letter-spacing:.02em;line-height:.88;color:var(--ink)}
.log-h1 em{color:var(--muted2);font-style:normal}
.log-stats{display:flex;gap:18px}
.lstat{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.lstat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;color:var(--ink);line-height:1}
.lstat-lbl{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* DATE + TOOLBAR */
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.date-inp{background:var(--card);border:1px solid var(--border);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s;-webkit-appearance:none;border-radius:0;flex-shrink:0}
.date-inp:focus{border-color:var(--ink)}
.toolbar{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto}
.tbtn{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:7px 11px;background:none;border:1px solid var(--border);color:var(--muted);transition:all .15s;white-space:nowrap}
.tbtn:hover,.tbtn:active{border-color:var(--ink);color:var(--ink)}
.tbtn.danger:hover,.tbtn.danger:active{border-color:var(--orange);color:var(--orange)}

/* EXERCISE BLOCKS */
.ex-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.ex-block{background:var(--card);border:1px solid var(--border);overflow:hidden;animation:up .2s ease both}
.ex-block-hdr{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--card2);border-bottom:1px solid var(--border2)}
.ex-name-inp{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink);min-width:0}
.ex-name-inp::placeholder{color:var(--muted2);font-weight:400}
.ex-hdr-btns{display:flex;gap:5px;align-items:center;flex-shrink:0}
.del-ex-btn{width:20px;height:20px;background:none;border:none;cursor:pointer;color:var(--muted2);font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;transition:color .15s;padding:0;flex-shrink:0}
.del-ex-btn:hover{color:var(--orange)}

/* SETS */
.sets-area{padding:10px 13px 4px}
.sets-boxes{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.set-box{display:flex;flex-direction:column;align-items:center;gap:3px}
.set-num{font-size:8px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-align:center;text-transform:uppercase}
.set-inp{background:var(--bg2);border:1px solid var(--border);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;text-align:center;padding:10px 0;outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none;border-radius:0;width:56px}
.set-inp:focus{border-color:var(--ink);background:var(--card)}
.set-inp.best{background:#e8ff4740;border-color:#bcd020}
.set-inp::placeholder{color:var(--muted2);font-size:13px;font-weight:400}
.ex-footer{display:flex;align-items:center;gap:8px;padding:8px 13px 11px}
.add-set-btn{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:5px 11px;background:none;border:1px dashed var(--border);color:var(--muted);transition:all .15s;flex-shrink:0}
.add-set-btn:hover,.add-set-btn:active{border-color:var(--ink);color:var(--ink)}
.ex-note-inp{flex:1;background:none;border:none;border-bottom:1px solid var(--border2);outline:none;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);font-style:italic;padding:3px 2px;transition:border-color .15s}
.ex-note-inp:focus{border-bottom-color:var(--ink);color:var(--ink)}
.ex-note-inp::placeholder{color:var(--muted2)}

/* ADD EX BUTTON */
.add-ex-btn{width:100%;padding:13px;background:none;border:1px dashed var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-bottom:18px}
.add-ex-btn:hover,.add-ex-btn:active{border-color:var(--ink);color:var(--ink);background:var(--card)}

/* NOTES */
.notes-inp{width:100%;background:var(--card);border:1px solid var(--border);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:11px 13px;outline:none;resize:none;min-height:60px;font-weight:300;line-height:1.6;transition:border-color .15s;margin-bottom:14px}
.notes-inp:focus{border-color:var(--ink)}.notes-inp::placeholder{color:var(--muted2)}

/* SAVE */
.save-btn{width:100%;padding:14px;background:var(--ink);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;cursor:pointer;transition:background .15s}
.save-btn:hover,.save-btn:active{background:#333}

/* RESTORE BANNER */
.restore-banner{display:none;margin:14px 20px 0;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--ink);padding:11px 13px;animation:up .3s ease both}
.restore-banner.visible{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rb-text{flex:1;min-width:0}
.rb-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:1px}
.rb-sub{font-size:10px;color:var(--muted)}
.rb-actions{display:flex;gap:5px;flex-shrink:0}

/* HISTORY */
.history-hdr{display:flex;align-items:center;justify-content:space-between;padding:22px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px;gap:10px;flex-wrap:wrap}
.history-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;color:var(--ink)}
.hinp{background:var(--card);border:1px solid var(--border);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.hinp:focus{border-color:var(--ink)}
.lcard{background:var(--card);border:1px solid var(--border);margin-bottom:7px;overflow:hidden;animation:up .2s ease both}
.lcard-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;transition:background .1s}
.lcard-hdr:hover,.lcard-hdr:active{background:var(--card2)}
.lcard-date{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--ink);letter-spacing:.03em;line-height:1;flex-shrink:0}
.lcard-info{flex:1;min-width:0}
.lcard-title{font-size:12px;font-weight:600;color:var(--ink)}
.lcard-sub{font-size:10px;color:var(--muted);margin-top:2px}
.lchip{font-size:7.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid var(--border);color:var(--muted)}
.lchip.pr{border-color:#0a7a5e55;color:var(--teal)}
.lchev{color:var(--muted);font-size:10px;transition:transform .2s;flex-shrink:0}
.lcard.open .lchev{transform:rotate(180deg)}
.lcard-body{display:none;border-top:1px solid var(--border)}
.lcard.open .lcard-body{display:block}
.lbt{width:100%;border-collapse:collapse;table-layout:fixed}
.lbt th{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:6px 11px;text-align:left;border-bottom:1px solid var(--border);background:var(--card2)}
.lbt th:nth-child(1){width:40%}.lbt th:nth-child(2){width:18%}.lbt th:nth-child(3){width:18%}.lbt th:nth-child(4){width:24%}
.lbt td{font-size:12px;padding:7px 11px;border-bottom:1px solid var(--border2);word-break:break-word;color:var(--ink)}
.lbt tr:last-child td{border-bottom:none}
.lbt .rep-val{font-weight:700;color:var(--ink)}
.lbt .wt-val{color:var(--muted)}
.lcard-note{font-size:11px;color:var(--muted);font-style:italic;padding:9px 13px;background:var(--card2);border-top:1px solid var(--border);line-height:1.6}
.lcard-actions{display:flex;gap:6px;padding:9px 13px;border-top:1px solid var(--border);background:var(--card2)}

/* PROGRESS */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:8px;padding:18px 0}
.prog-card{background:var(--card);border:1px solid var(--border);padding:14px 16px}
.prog-title{font-size:11px;font-weight:600;margin-bottom:9px;color:var(--muted)}
.prog-stat-row{display:flex;justify-content:space-between;margin-top:7px}
.prog-stat .val{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.03em;text-align:center;color:var(--ink)}
.prog-stat .lbl{font-size:8px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:30px;margin-bottom:10px;opacity:.18}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted2);margin-bottom:5px;letter-spacing:.05em}
.empty-sub{font-size:11.5px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border:1px solid var(--border);padding:22px 24px;max-width:340px;width:90%;transform:translateY(8px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.06em;margin-bottom:9px;color:var(--ink)}
.modal-body{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal-footer{display:flex;gap:7px;justify-content:flex-end}
.modal-fld{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.modal-lbl{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 18px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:400px){
  .toolbar{gap:4px}
  .tbtn{padding:6px 8px;font-size:8.5px}
}
</style>
</head>
<body>
<div class="grain"></div>

<div class="topbar">
  <div class="topbar-title">Journal</div>
  <button class="topbar-btn" onclick="openExportModal()">⬇ Export</button>
</div>

<div class="restore-banner" id="restoreBanner">
  <div style="font-size:18px;flex-shrink:0">💾</div>
  <div class="rb-text">
    <div class="rb-title">No data — restore from backup?</div>
    <div class="rb-sub">Pick <strong>gymjournal_autosave.json</strong> from Downloads.</div>
  </div>
  <div class="rb-actions">
    <button class="tbtn" onclick="document.getElementById('bannerFile').click()">Restore →</button>
    <input type="file" id="bannerFile" accept=".json,application/json" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" onchange="restoreJSON(event)">
    <button class="tbtn" onclick="dismissBanner()">✕</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Log</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('progress')">Progress</button>
</div>

<!-- LOG -->
<div class="tab-content active" id="tab-log">
  <div class="main">
    <div class="log-header">
      <div><div class="log-h1">LOG<em> SESSION</em></div></div>
      <div class="log-stats">
        <div class="lstat"><div class="lstat-val" id="statWeek">0</div><div class="lstat-lbl">This week</div></div>
        <div class="lstat"><div class="lstat-val" id="statTotal">0</div><div class="lstat-lbl">Total</div></div>
      </div>
    </div>
    <div class="date-row">
      <input type="date" id="sessionDate" class="date-inp">
      <div class="toolbar">
        <button class="tbtn" onclick="loadLast()">↩ Last</button>
        <button class="tbtn" onclick="clearAll()">✕ Clear</button>
        <button class="tbtn" onclick="document.getElementById('restoreFile').click()">📂</button>
        <button class="tbtn" onclick="backupJSON()">💾</button>
        <input type="file" id="restoreFile" accept=".json,application/json" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0" onchange="restoreJSON(event)">
      </div>
    </div>
    <div class="ex-list" id="exList"></div>
    <button class="add-ex-btn" onclick="addExercise()">+ Add Exercise</button>
    <textarea id="logNotes" class="notes-inp" placeholder="Session notes..."></textarea>
    <button class="save-btn" onclick="saveSession()">Save Session →</button>
  </div>
</div>

<!-- HISTORY -->
<div class="tab-content" id="tab-history">
  <div class="main">
    <div class="history-hdr">
      <div class="history-title">History</div>
      <input type="text" id="searchInput" class="hinp" style="width:160px" placeholder="Search..." oninput="renderHistory()">
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="tab-content" id="tab-progress">
  <div class="main">
    <div class="prog-grid" id="progGrid"></div>
    <div id="progEmpty"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Delete Session?</div>
    <div class="modal-body">This will permanently remove this session.</div>
    <div class="modal-footer">
      <button class="tbtn" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="tbtn danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">Export Journal</div>
    <div class="modal-fld"><div class="modal-lbl">From</div><input type="date" id="exportFrom" class="hinp"></div>
    <div class="modal-fld"><div class="modal-lbl">To</div><input type="date" id="exportTo" class="hinp"></div>
    <div class="modal-fld">
      <div class="modal-lbl">Format</div>
      <select id="exportFormat" class="hinp">
        <option value="xlsx">Excel (.xlsx)</option>
        <option value="csv">CSV</option>
        <option value="android">Android HTML</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="tbtn" onclick="closeModal('exportModal')">Cancel</button>
      <button class="tbtn" onclick="doExport()" style="border-color:var(--ink);color:var(--ink)">Export →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STORAGE ──────────────────────────────
function getSessions(){try{return JSON.parse(localStorage.getItem('gymJournal')||'[]')}catch{return[]}}
function saveSessions(s){localStorage.setItem('gymJournal',JSON.stringify(s));autoSave(s)}
function autoSave(sessions){
  try{
    const b=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),sessions})],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='gymjournal_autosave.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }catch(e){}
}

// ── UTILS ─────────────────────────────────
let exCounter=0;
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ── ADD EXERCISE ──────────────────────────
function addExercise(name='', savedSets=[], note='', pr=false){
  const id='ex'+(++exCounter);
  const block=document.createElement('div');
  block.className='ex-block';block.id=id;

  const initialSets = savedSets.length ? savedSets : [{},{},{},{}];

  block.innerHTML=`
    <div class="ex-block-hdr">
      <input class="ex-name-inp" type="text" value="${esc(name)}" placeholder="Exercise name">
      <div class="ex-hdr-btns">
        <button class="del-ex-btn" onclick="document.getElementById('${id}').remove()" title="Remove">×</button>
      </div>
    </div>
    <div class="sets-area">
      <div class="sets-boxes" id="${id}-sets">
        ${initialSets.map((s,i)=>setBoxHTML(i,s)).join('')}
      </div>
    </div>
    <div class="ex-footer">
      <button class="add-set-btn" onclick="addSet('${id}-sets')">+ Set</button>
      <input class="ex-note-inp" type="text" value="${esc(note)}" placeholder="note...">
    </div>`;

  document.getElementById('exList').appendChild(block);

  block.addEventListener('input',e=>{
    if(e.target.classList.contains('set-inp')) highlightBest(block);
  });

  if(!name) block.querySelector('.ex-name-inp').focus();
  return block;
}

function setBoxHTML(idx, data={}){
  return`<div class="set-box" data-idx="${idx}">
    <div class="set-num">S${idx+1}</div>
    <input class="set-inp" type="number" inputmode="numeric" data-field="reps" value="${esc(String(data.reps||''))}" placeholder="—">
  </div>`;
}

function addSet(setsId){
  const container=document.getElementById(setsId);
  const idx=container.querySelectorAll('.set-box').length;
  container.insertAdjacentHTML('beforeend',setBoxHTML(idx));
  container.querySelector('.set-box:last-child .set-inp').focus();
}

function highlightBest(block){
  const inputs=[...block.querySelectorAll('.set-inp[data-field="reps"]')];
  const vals=inputs.map(i=>parseFloat(i.value)||0);
  const max=Math.max(...vals);
  inputs.forEach((inp,i)=>inp.classList.toggle('best',vals[i]===max&&max>0));
}

// ── COLLECT ───────────────────────────────
function collectExercises(){
  return[...document.querySelectorAll('#exList .ex-block')].reduce((acc,block)=>{
    const name=block.querySelector('.ex-name-inp').value.trim();
    if(!name)return acc;
    const pr=false;
    const note=block.querySelector('.ex-note-inp').value.trim();
    const sets=[...block.querySelectorAll('.set-box')].map(box=>({
      reps:box.querySelector('[data-field="reps"]').value.trim(),
    })).filter(s=>s.reps);
    if(sets.length)acc.push({name,pr,note,sets});
    return acc;
  },[]);
}

// ── SAVE / CLEAR / LOAD ───────────────────
function saveSession(){
  const date=document.getElementById('sessionDate').value;
  if(!date){showToast('Set a date first');return}
  const exercises=collectExercises();
  if(!exercises.length){showToast('Add at least one exercise');return}
  const sessions=getSessions();
  sessions.unshift({id:Date.now(),date,notes:document.getElementById('logNotes').value.trim(),exercises});
  saveSessions(sessions);
  renderStats();renderHistory();
  showToast('Session saved ✓');
}

function clearAll(){
  document.getElementById('exList').innerHTML='';
  document.getElementById('logNotes').value='';
  exCounter=0;
}

function loadLast(){
  const s=getSessions()[0];
  if(!s){showToast('No previous session found');return}
  document.getElementById('exList').innerHTML='';exCounter=0;
  s.exercises.forEach(e=>addExercise(e.name,[],e.note||'',e.pr||false));
  document.getElementById('logNotes').value='';
  showToast('Exercises loaded — sets cleared');
}

// ── STATS ─────────────────────────────────
function renderStats(){
  const sessions=getSessions(),now=new Date(),ws=new Date(now);
  ws.setDate(now.getDate()-((now.getDay()+6)%7));ws.setHours(0,0,0,0);
  document.getElementById('statWeek').textContent=sessions.filter(s=>new Date(s.date+'T00:00:00')>=ws).length;
  document.getElementById('statTotal').textContent=sessions.length;
}

// ── HISTORY ───────────────────────────────
function renderHistory(){
  const sessions=getSessions();
  const search=document.getElementById('searchInput').value.toLowerCase();
  const filtered=sessions.filter(s=>{
    if(!search)return true;
    return((s.notes||'')+' '+s.exercises.map(e=>e.name).join(' ')).toLowerCase().includes(search);
  });
  const el=document.getElementById('historyList');
  if(!filtered.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Log your first workout above.</div></div>`;
    return;
  }
  el.innerHTML=filtered.map(s=>{
    const totalSets=s.exercises.reduce((a,e)=>a+(e.sets?.length||0),0);
    const exRows=s.exercises.map(e=>{
      const setStr=e.sets.map((set,i)=>{
        return`<span style="margin-right:5px"><span class="rep-val">S${i+1}:${set.reps||'—'}</span>`;
      }).join('');
      return`<tr>
        <td style="font-weight:600">${esc(e.name)}</td>
        <td style="font-size:11px">${setStr}</td>
        <td style="color:var(--muted);font-style:italic;font-size:11px">${esc(e.note||'')}</td>
      </tr>`;
    }).join('');
    return`<div class="lcard" id="lc${s.id}">
      <div class="lcard-hdr" onclick="document.getElementById('lc${s.id}').classList.toggle('open')">
        <div class="lcard-date">${fmtDate(s.date).split(' ').slice(1).join(' ')}</div>
        <div class="lcard-info">
          <div class="lcard-title">${fmtDate(s.date)}</div>
          <div class="lcard-sub">${s.exercises.length} ex · ${totalSets} sets</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0"></div>
        <div class="lchev">▼</div>
      </div>
      <div class="lcard-body">
        <table class="lbt">
          <thead><tr><th>Exercise</th><th>Sets</th><th>Note</th></tr></thead>
          <tbody>${exRows}</tbody>
        </table>
        ${s.notes?`<div class="lcard-note">"${esc(s.notes)}"</div>`:''}
        <div class="lcard-actions">
          <button class="tbtn" onclick="editSession(${s.id})">Edit</button>
          <button class="tbtn danger" onclick="confirmDelete(${s.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function editSession(id){
  const s=getSessions().find(x=>x.id===id);if(!s)return;
  switchTab('log');
  document.getElementById('sessionDate').value=s.date;
  document.getElementById('logNotes').value=s.notes||'';
  document.getElementById('exList').innerHTML='';exCounter=0;
  s.exercises.forEach(e=>addExercise(e.name,e.sets||[],e.note||'',e.pr||false));
  saveSessions(getSessions().filter(x=>x.id!==id));
  showToast('Edit mode — save to update');
}

function confirmDelete(id){
  document.getElementById('confirmDeleteBtn').onclick=()=>{
    saveSessions(getSessions().filter(s=>s.id!==id));
    renderHistory();renderStats();
    closeModal('deleteModal');showToast('Deleted');
  };
  openModal('deleteModal');
}

// ── PROGRESS ──────────────────────────────
function renderProgress(){
  const sessions=getSessions();
  const grid=document.getElementById('progGrid'),empty=document.getElementById('progEmpty');
  if(!sessions.length){grid.innerHTML='';empty.innerHTML=`<div class="empty"><div class="empty-icon">📈</div><div class="empty-title">No data yet</div><div class="empty-sub">Log a few sessions first.</div></div>`;return}
  empty.innerHTML='';
  const exMap={};
  sessions.slice().reverse().forEach(s=>s.exercises.forEach(e=>{
    if(!e.name)return;
    const bestReps=Math.max(0,...(e.sets||[]).map(s=>parseFloat(s.reps)||0));
    if(!exMap[e.name])exMap[e.name]=[];
    exMap[e.name].push({date:s.date,best:bestReps,sets:e.sets?.length||0});
  }));
  grid.innerHTML=Object.entries(exMap).sort((a,b)=>b[1].length-a[1].length).slice(0,8).map(([name,hist])=>{
    const vals=hist.map(h=>h.best),maxV=Math.max(...vals,1);
    const pts=vals.map((v,i)=>`${vals.length===1?50:(i/(vals.length-1))*100},${54-(v/maxV)*48}`).join(' ');
    return`<div class="prog-card">
      <div class="prog-title">${esc(name)}</div>
      <svg width="100%" height="54" viewBox="0 0 100 54" preserveAspectRatio="none" style="display:block;margin-bottom:7px">
        <polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".35"/>
        ${vals.map((v,i)=>`<circle cx="${vals.length===1?50:(i/(vals.length-1))*100}" cy="${54-(v/maxV)*48}" r="2.5" fill="var(--ink)" opacity=".7"/>`).join('')}
      </svg>
      <div class="prog-stat-row">
        <div class="prog-stat"><div class="val">${Math.max(...vals)||'—'}</div><div class="lbl">Best</div></div>
        <div class="prog-stat"><div class="val">${hist.reduce((a,h)=>a+h.sets,0)}</div><div class="lbl">Sets</div></div>
        <div class="prog-stat"><div class="val">${hist.length}</div><div class="lbl">Sessions</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── EXPORT / BACKUP / RESTORE ─────────────
function openExportModal(){
  const sessions=getSessions();if(!sessions.length){showToast('No sessions to export');return}
  const dates=sessions.map(s=>s.date).sort();
  document.getElementById('exportFrom').value=dates[0];
  document.getElementById('exportTo').value=dates[dates.length-1];
  openModal('exportModal');
}
function doExport(){
  const from=document.getElementById('exportFrom').value,to=document.getElementById('exportTo').value,fmt=document.getElementById('exportFormat').value;
  closeModal('exportModal');
  const sessions=getSessions().filter(s=>(!from||s.date>=from)&&(!to||s.date<=to)).reverse();
  if(!sessions.length){showToast('No sessions in range');return}
  if(fmt==='xlsx')exportXLSX(sessions);else if(fmt==='csv')exportCSV(sessions);else exportAndroidHTML(sessions);
}
function exportXLSX(sessions){
  const wb=XLSX.utils.book_new();
  const s1=[['Date','Exercises','Total Sets','Notes']];
  sessions.forEach(s=>s1.push([s.date,s.exercises.length,s.exercises.reduce((a,e)=>a+(e.sets?.length||0),0),s.notes||'']));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),'Sessions');
  const s2=[['Date','Exercise','Set','Reps']];
  sessions.forEach(s=>s.exercises.forEach(e=>(e.sets||[]).forEach((set,i)=>s2.push([s.date,e.name,i+1,set.reps||'']))));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),'Exercise Log');
  XLSX.writeFile(wb,`gym_journal_${today().replace(/-/g,'')}.xlsx`);showToast('Excel exported ✓');
}
function exportCSV(sessions){
  const rows=[['Date','Exercise','Set','Reps']];
  sessions.forEach(s=>s.exercises.forEach(e=>(e.sets||[]).forEach((set,i)=>rows.push([s.date,e.name,i+1,set.reps||'']))));
  dlFile(`gym_journal_${today().replace(/-/g,'')}.csv`,rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'text/csv');
  showToast('CSV exported ✓');
}
function exportAndroidHTML(sessions){
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gym Journal</title><style>body{background:#f2f2f0;color:#1a1a1a;font-family:sans-serif;padding:14px 14px 60px;font-size:14px}h1{font-size:26px;font-weight:900;margin-bottom:14px}.s{background:#fff;border:1px solid #ddddd8;margin-bottom:10px}.sh{padding:10px 12px;border-bottom:1px solid #eeeee9}.st{font-size:12.5px;font-weight:600}.ss{font-size:10px;color:#999;margin-top:2px}table{width:100%;border-collapse:collapse;table-layout:fixed}th{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#999;padding:5px 9px;text-align:left;border-bottom:1px solid #eeeee9;background:#f7f7f5}th:nth-child(1){width:38%}th:nth-child(2){width:14%}th:nth-child(3){width:14%}th:nth-child(4){width:14%}th:nth-child(5){width:20%}td{padding:7px 9px;border-bottom:1px solid #eeeee9;font-size:11.5px;word-break:break-word}tr:last-child td{border-bottom:none}.note{font-size:11px;color:#999;font-style:italic;padding:7px 10px;background:#f7f7f5;border-top:1px solid #eeeee9}</style></head><body><h1>Gym Journal</h1>${sessions.map(s=>`<div class="s"><div class="sh"><div class="st">${fmtDate(s.date)}</div><div class="ss">${s.exercises.length} exercises · ${s.exercises.reduce((a,e)=>a+(e.sets?.length||0),0)} sets</div></div><table><thead><tr><th>Exercise</th><th>Set</th><th>Reps</th><th>Weight</th><th>Note</th></tr></thead><tbody>${s.exercises.map(e=>(e.sets||[]).map((set,i)=>`<tr><td>${i===0?esc(e.name)+(e.pr?' ★':''):''}</td><td>S${i+1}</td><td><strong>${set.reps||'—'}</strong></td><td>${set.weight||'—'}</td><td style="color:#999;font-style:italic">${esc(set.note||'')}</td></tr>`).join('')).join('')}</tbody></table>${s.notes?`<div class="note">"${esc(s.notes)}"</div>`:''}</div>`).join('')}</body></html>`;
  dlFile(`gym_journal_android_${today().replace(/-/g,'')}.html`,html,'text/html');showToast('Android HTML exported ✓');
}
function backupJSON(){
  const sessions=getSessions();if(!sessions.length){showToast('Nothing to back up');return}
  dlFile('gymjournal_autosave.json',JSON.stringify({version:1,exported:new Date().toISOString(),sessions},null,2),'application/json');
  showToast(`Backup saved — ${sessions.length} sessions ✓`);
}
function restoreJSON(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.sessions||!Array.isArray(data.sessions))throw new Error('Invalid');
      const existing=getSessions(),ids=new Set(existing.map(s=>s.id));
      const merged=[...existing,...data.sessions.filter(s=>!ids.has(s.id))].sort((a,b)=>new Date(b.date)-new Date(a.date));
      saveSessions(merged);renderStats();renderHistory();dismissBanner();
      showToast(`Restored ${merged.length} sessions ✓`);
    }catch{showToast('Error reading backup file')}
    event.target.value='';
  };
  reader.readAsText(file);
}
function dlFile(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click()}

// ── TABS / MODAL / TOAST / BANNER ─────────
function switchTab(name){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const idx=['log','history','progress'].indexOf(name);
  if(idx>=0)document.querySelectorAll('.tab')[idx].classList.add('active');
  if(name==='history')renderHistory();
  if(name==='progress')renderProgress();
}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));
let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400)}
function dismissBanner(){document.getElementById('restoreBanner').classList.remove('visible')}

// ── INIT ──────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('sessionDate').value=today();
  renderStats();
  if(!getSessions().length)document.getElementById('restoreBanner').classList.add('visible');
  if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
});
</script>
</body>
